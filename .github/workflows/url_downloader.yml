name: "دانلودر لینک مستقیم"

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Direct File URL"
        required: true
        type: string

      zip_password:
        description: "Password for archive (leave empty for no password)"
        required: false
        default: ""
        type: string

      max_part_mb:
        description: "Maximum size per part (MB)"
        required: false
        default: "90"
        type: string

      upload_method:
        description: "Upload Method"
        required: true
        default: "release"
        type: choice
        options:
          - repository
          - release

      release_tag:
        description: "Release Tag"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  direct-download:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y p7zip-full curl

      - name: Download File
        id: download
        shell: bash
        run: |
          mkdir -p temp_dl

          FILE_URL="${{ github.event.inputs.file_url }}"

          FILENAME=$(basename "$FILE_URL" | cut -d'?' -f1)
          FILENAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._() -]/_/g')

          echo "Downloading: $FILENAME"

          curl -L --fail --retry 3 \
            -o "temp_dl/$FILENAME" \
            "$FILE_URL"

          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"

      - name: Create Split Archive و حذف فایل اصلی
        id: archive
        shell: bash
        run: |
          FILENAME="${{ steps.download.outputs.filename }}"
          PASS="${{ github.event.inputs.zip_password }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"

          if [[ -z "$THRESH_MB" || "$THRESH_MB" -le 0 ]]; then
            THRESH_MB=90
          fi

          cd temp_dl || exit 1

          ARCHIVE_BASE="${FILENAME%.*}_$(date +%Y%m%d_%H%M%S)"

          if [ -n "$PASS" ]; then
            7z a -p"$PASS" -mhe=on -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$FILENAME"
          else
            7z a -mx=3 -v${THRESH_MB}m "${ARCHIVE_BASE}.7z" "$FILENAME"
          fi

          # 🔑 مهم: حذف فایل اصلی
          rm -f "$FILENAME"

          echo "✅ فقط تکه‌ها نگه داشته شدند:"
          ls -lh *.7z.*

          cd ..

      - name: Get Current Date
        id: get_date
        shell: bash
        run: |
          echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Push to Repository (فقط تکه‌ها)
        if: github.event.inputs.upload_method == 'repository'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p downloads

          # فقط تکه‌های 7z رو منتقل کن
          mv temp_dl/*.7z* downloads/ 2>/dev/null || true

          git add downloads/

          git commit -m "Direct Download: ${{ steps.download.outputs.filename }} [skip ci]" || echo "Nothing to commit"

          git push

      - name: Upload to GitHub Releases (فقط تکه‌ها)
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('direct-{0}', github.run_number) }}
          name: Direct Download Release - ${{ steps.download.outputs.filename }}
          body: |
            ✅ دانلود کامل شد!
            
            فایل: ${{ steps.download.outputs.filename }}
            تاریخ: ${{ steps.get_date.outputs.date }}
            
            **نحوه Extract:**
            تمام تکه‌ها را دانلود کرده و روی فایل .7z.001 کلیک راست → Extract Here
          files: temp_dl/*.7z.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf temp_dl
