name: Download Full Website (Complete)
on:
  push:
  workflow_dispatch:

jobs:
  download_website:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Download complete website
      run: |
        mkdir -p downloaded_site
        
        # این دستور CSS، JS، تصاویر و همه چیز رو دانلود میکنه
        wget \
          --recursive \           # دانلود بازگشتی
          --level=inf \           # تا هر عمقی بره
          --no-clobber \          # فایل‌های تکراری رو دوباره دانلود نکن
          --page-requisites \     # ✅ CSS، JS، تصاویر رو دانلود کن
          --html-extension \      # پسوند .html به صفحات بده
          --convert-links \       # لینک‌ها رو برای آفلاین تبدیل کن
          --restrict-file-names=windows \
          --domains www.01010101.shop \
          --no-parent \
          --tries=3 \
          --timeout=20 \
          --wait=2 \
          --random-wait \
          --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
          -P downloaded_site \
          http://www.01010101.shop/ || true
        
        echo "✅ Download completed!"
    
    - name: Show downloaded files
      run: |
        echo "📊 Total files: $(find downloaded_site -type f | wc -l)"
        echo ""
        echo "📁 File types:"
        find downloaded_site -type f | sed 's/.*\.//' | sort | uniq -c | sort -rn
        echo ""
        echo "📂 Directory structure:"
        ls -la downloaded_site/www.01010101.shop/
    
    - name: Upload as artifact
      uses: actions/upload-artifact@v4
      with:
        name: complete-website
        path: downloaded_site/
        retention-days: 7
