name: Download Full Website (Complete)
on:
  push:
  workflow_dispatch:

jobs:
  download_website:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Download complete website
      run: |
        mkdir -p downloaded_site
        
        # دستور زیر بدون هیچ اسپیس اضافی
        wget \
          --recursive \
          --level=inf \
          --no-clobber \
          --page-requisites \
          --html-extension \
          --convert-links \
          --restrict-file-names=windows \
          --domains www.01010101.shop \
          --no-parent \
          --tries=3 \
          --timeout=20 \
          --wait=2 \
          --random-wait \
          --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
          -P downloaded_site \
          http://www.01010101.shop/
        
        echo "✅ Download completed!"
    
    - name: Show downloaded files
      run: |
        echo "📊 Total files: $(find downloaded_site -type f 2>/dev/null | wc -l)"
        echo ""
        if [ -d "downloaded_site" ]; then
          echo "📂 Directory size:"
          du -sh downloaded_site/ 2>/dev/null
          echo ""
          echo "📁 File types:"
          find downloaded_site -type f 2>/dev/null | sed 's/.*\.//' | sort | uniq -c | sort -rn | head -10
        else
          echo "❌ No files downloaded"
        fi
    
    - name: Upload as artifact
      uses: actions/upload-artifact@v4
      with:
        name: complete-website
        path: downloaded_site/
        retention-days: 7
        if-no-files-found: warn
