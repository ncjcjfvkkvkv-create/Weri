name: دانلود از APKMirror

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'شناسه بسته (مثلاً com.netmarble.gotasia)'
        required: true
        type: string
        default: 'com.netmarble.gotasia'

jobs:
  download-from-apkmirror:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: ۱. راه‌اندازی مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ۲. نصب ابزارهای مورد نیاز
        run: |
          sudo apt-get update
          sudo apt-get install -y jq wget unzip html-xml-utils

      - name: ۳. دریافت لینک دانلود و دانلود فایل
        id: download
        run: |
          mkdir -p downloads
          PACKAGE="${{ inputs.package_name }}"
          
          echo "🔍 در حال جستجوی $PACKAGE در APKMirror..."
          
          # 1. دریافت صفحه اصلی اپ
          PAGE_URL="https://www.apkmirror.com/apk/netmarble-corporation/game-of-thrones-kingsroad/"
          echo "📄 دریافت صفحه: $PAGE_URL"
          
          # دریافت محتوای صفحه با هدرهای مناسب
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Referer: https://www.apkmirror.com/" \
            "$PAGE_URL" -o temp_page.html
          
          # 2. پیدا کردن لینک دانلود (با جستجوی الگوی دانلود)
          echo "🔎 در حال پیدا کردن لینک دانلود..."
          
          # پیدا کردن لینک دانلود از صفحه
          DOWNLOAD_LINK=$(grep -oP 'https://www.apkmirror.com/wp-content/themes/APKMirror/download.php\?id=[0-9]+' temp_page.html | head -1)
          
          if [ -z "$DOWNLOAD_LINK" ]; then
            echo "❌ لینک دانلود پیدا نشد!"
            exit 1
          fi
          
          echo "✅ لینک دانلود پیدا شد: $DOWNLOAD_LINK"
          
          # 3. دانلود فایل نهایی
          echo "⬇️ شروع دانلود فایل..."
          curl -L -b cookies.txt \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: $PAGE_URL" \
            -H "Accept: application/vnd.android.package-archive" \
            "$DOWNLOAD_LINK" -o downloads/app.apk
          
          # 4. بررسی فایل دانلود شده
          if [ ! -f downloads/app.apk ] || [ ! -s downloads/app.apk ]; then
            echo "❌ خطا در دانلود فایل!"
            exit 1
          fi
          
          FILE_SIZE=$(du -h downloads/app.apk | cut -f1)
          echo "✅ فایل با موفقیت دانلود شد! حجم: $FILE_SIZE"
          echo "file_path=downloads/app.apk" >> $GITHUB_OUTPUT

      - name: ۴. ساخت نسخه (Release)
        if: steps.download.outputs.file_path != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          TAG_NAME="apkmirror-${{ inputs.package_name }}-$TIMESTAMP"
          RELEASE_NAME="دانلود از APKMirror: ${{ inputs.package_name }} - $TIMESTAMP"
          
          gh release create "$TAG_NAME" ${{ steps.download.outputs.file_path }} \
            --title "$RELEASE_NAME" \
            --notes "فایل بسته ${{ inputs.package_name }} به صورت خودکار از APKMirror دانلود شده است."

      - name: ۵. آپلود فایل به عنوان Artifact
        if: steps.download.outputs.file_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_name }}-apkmirror
          path: downloads/app.apk
          retention-days: 7
