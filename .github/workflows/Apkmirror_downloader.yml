name: دانلود از APKMirror

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'شناسه بسته (مثلاً com.netmarble.gotasia)'
        required: true
        type: string
        default: 'com.netmarble.gotasia'

jobs:
  download-from-apkmirror:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: ۱. راه‌اندازی مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ۲. نصب ابزارهای مورد نیاز
        run: |
          sudo apt-get update
          sudo apt-get install -y jq wget unzip

      - name: ۳. نصب htmlq (برای پردازش حرفه‌ای HTML)
        run: |
          wget -q -O /tmp/htmlq.tar.gz https://github.com/mgdm/htmlq/releases/latest/download/htmlq-x86_64-linux.tar.gz
          tar -xzf /tmp/htmlq.tar.gz -C /tmp
          sudo mv /tmp/htmlq /usr/local/bin/
          sudo chmod +x /usr/local/bin/htmlq

      - name: ۴. دریافت و دانلود فایل
        id: download
        run: |
          mkdir -p downloads
          PACKAGE="${{ inputs.package_name }}"
          
          echo "🔍 در حال جستجوی $PACKAGE در APKMirror..."
          
          # صفحه اصلی بازی
          BASE_URL="https://www.apkmirror.com/apk/netmarble-corporation/game-of-thrones-kingsroad/"
          
          # دریافت محتوای صفحه
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Referer: https://www.apkmirror.com/" \
            "$BASE_URL" -o temp_page.html
          
          # استخراج لینک آخرین نسخه با استفاده از htmlq
          DOWNLOAD_PAGE_LINK=$(cat temp_page.html | htmlq -a href 'a[class="btn btn-primary btn-md downloadLink"]' | head -1)
          
          if [ -z "$DOWNLOAD_PAGE_LINK" ]; then
            echo "❌ لینک دانلود پیدا نشد!"
            echo "🔄 تلاش با روش جایگزین..."
            # روش جایگزین: جستجوی لینک با grep
            DOWNLOAD_PAGE_LINK=$(grep -oP 'https://www.apkmirror.com/apk/[^"]+/download/\?key=[^"]+' temp_page.html | head -1)
          fi
          
          if [ -z "$DOWNLOAD_PAGE_LINK" ]; then
            echo "❌ لینک دانلود پیدا نشد!"
            exit 1
          fi
          
          echo "✅ لینک دانلود پیدا شد: $DOWNLOAD_PAGE_LINK"
          
          # دریافت صفحه دانلود نهایی
          echo "📄 دریافت صفحه دانلود..."
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
            -H "Referer: $BASE_URL" \
            "$DOWNLOAD_PAGE_LINK" -o final_download_page.html
          
          # پیدا کردن لینک نهایی APK
          FINAL_LINK=$(cat final_download_page.html | htmlq -a href 'a[class="downloadButton"]' | head -1)
          
          if [ -z "$FINAL_LINK" ]; then
            FINAL_LINK=$(grep -oP 'https://www.apkmirror.com/wp-content/themes/APKMirror/download.php\?id=[0-9]+' final_download_page.html | head -1)
          fi
          
          if [ -z "$FINAL_LINK" ]; then
            echo "❌ لینک نهایی پیدا نشد!"
            exit 1
          fi
          
          echo "⬇️ شروع دانلود فایل..."
          curl -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: $DOWNLOAD_PAGE_LINK" \
            -H "Accept: application/vnd.android.package-archive" \
            "$FINAL_LINK" -o downloads/app.apk
          
          if [ ! -f downloads/app.apk ] || [ ! -s downloads/app.apk ]; then
            echo "❌ خطا در دانلود فایل!"
            exit 1
          fi
          
          FILE_SIZE=$(du -h downloads/app.apk | cut -f1)
          echo "✅ فایل با موفقیت دانلود شد! حجم: $FILE_SIZE"
          echo "file_path=downloads/app.apk" >> $GITHUB_OUTPUT

      - name: ۵. ساخت نسخه (Release)
        if: steps.download.outputs.file_path != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          TAG_NAME="apkmirror-${{ inputs.package_name }}-$TIMESTAMP"
          RELEASE_NAME="دانلود از APKMirror: ${{ inputs.package_name }} - $TIMESTAMP"
          
          gh release create "$TAG_NAME" ${{ steps.download.outputs.file_path }} \
            --title "$RELEASE_NAME" \
            --notes "فایل بسته ${{ inputs.package_name }} به صورت خودکار از APKMirror دانلود شده است."

      - name: ۶. آپلود فایل به عنوان Artifact
        if: steps.download.outputs.file_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_name }}-apkmirror
          path: downloads/app.apk
          retention-days: 7
