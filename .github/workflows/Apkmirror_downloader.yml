name: Download Full Website
on:
  push:
  workflow_dispatch:

jobs:
  download_website:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Download website with wget
      run: |
        mkdir -p downloaded_site
        
        wget \
          --recursive \
          --level=inf \
          --no-clobber \
          --page-requisites \
          --html-extension \
          --convert-links \
          --restrict-file-names=windows \
          --domains www.01010101.shop \
          --no-parent \
          --ignore-errors \
          --tries=3 \
          --timeout=20 \
          --wait=1 \
          --random-wait \
          --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          --referer="http://www.01010101.shop/" \
          -P downloaded_site \
          http://www.01010101.shop/ || echo "⚠️ Some files failed, but continuing..."
    
    - name: Show download summary
      run: |
        echo "📊 Summary of downloaded files:"
        echo "--------------------------------"
        echo "Total files: $(find downloaded_site -type f | wc -l)"
        echo ""
        echo "📁 File types:"
        find downloaded_site -type f | sed 's/.*\.//' | sort | uniq -c | sort -rn | head -10
        echo ""
        echo "📂 Directory structure:"
        du -sh downloaded_site/
        echo ""
        echo "📄 Sample files:"
        find downloaded_site -type f -name "*.html" | head -5
    
    - name: Upload as artifact
      uses: actions/upload-artifact@v4
      with:
        name: downloaded-site
        path: downloaded_site/
        retention-days: 7
