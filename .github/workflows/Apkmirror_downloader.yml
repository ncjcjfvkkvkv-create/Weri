name: دانلود فایل کامل بازی (با لینک دائمی)

on:
  workflow_dispatch:

jobs:
  download-full-game:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ۱. راه‌اندازی مخزن
        uses: actions/checkout@v4

      - name: ۲. نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: ۳. دریافت لینک دائمی و دانلود
        id: download
        run: |
          mkdir -p downloads
          
          # لینک دائمی صفحه آخرین نسخه (نه لینک مستقیم!)
          PAGE_URL="https://www.apkmirror.com/apk/netmarble-corporation/game-of-thrones-kingsroad/game-of-thrones-kingsroad-1-4-18-release/game-of-thrones-kingsroad-1-4-18-android-apk-download/"
          
          echo "📄 دریافت صفحه از: $PAGE_URL"
          
          # دریافت محتوای صفحه با هدرهای مناسب
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
            -H "Referer: https://www.apkmirror.com/" \
            "$PAGE_URL" -o temp_page.html
          
          # استخراج لینک نهایی با الگوی خاص APKMirror
          # لینک‌ها به صورت: https://www.apkmirror.com/wp-content/themes/APKMirror/download.php?id=XXXXXXXXX
          DOWNLOAD_LINK=$(grep -oP 'https://www.apkmirror.com/wp-content/themes/APKMirror/download.php\?id=[0-9]+' temp_page.html | head -2 | tail -1)
          
          if [ -z "$DOWNLOAD_LINK" ]; then
            echo "❌ لینک دانلود پیدا نشد!"
            echo "🔄 تلاش روش دوم..."
            DOWNLOAD_LINK=$(grep -oP 'https://www.apkmirror.com/apk/[^"]+\.apk' temp_page.html | head -1)
          fi
          
          if [ -z "$DOWNLOAD_LINK" ]; then
            echo "❌ لینک دانلود پیدا نشد!"
            exit 1
          fi
          
          echo "✅ لینک پیدا شد: $DOWNLOAD_LINK"
          
          echo "⬇️ شروع دانلود (حدود ۲.۵ گیگابایت)..."
          curl -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: https://www.apkmirror.com/" \
            -H "Accept: application/vnd.android.package-archive" \
            --progress-bar \
            "$DOWNLOAD_LINK" -o downloads/got-kingsroad-full.apk
          
          if [ ! -f downloads/got-kingsroad-full.apk ] || [ ! -s downloads/got-kingsroad-full.apk ]; then
            echo "❌ دانلود ناموفق بود!"
            exit 1
          fi
          
          FILE_SIZE=$(du -h downloads/got-kingsroad-full.apk | cut -f1)
          echo "✅ دانلود کامل شد! حجم: $FILE_SIZE"
          echo "file_path=downloads/got-kingsroad-full.apk" >> $GITHUB_OUTPUT

      - name: ۴. ساخت Release
        if: steps.download.outputs.file_path != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          gh release create "full-game-$TIMESTAMP" ${{ steps.download.outputs.file_path }} \
            --title "Game of Thrones: Kingsroad - فایل کامل" \
            --notes "فایل کامل بازی از APKMirror دانلود شده است."

      - name: ۵. آپلود به عنوان Artifact
        if: steps.download.outputs.file_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: got-kingsroad-full
          path: downloads/got-kingsroad-full.apk
          retention-days: 7
